services:
  postgres:
    image: postgres:16-alpine
    container_name: studenttracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8963Aa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_tracker"]
      interval: 5s
      timeout: 5s
      retries: 20



  backend:
    build:
      context: ./backend
    container_name: studenttracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/student_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 8963Aa
      FILE_UPLOAD_DIR: uploads
      APP_FRONTEND_URL: http://localhost:5173/
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend:/app
    working_dir: /app
    command: ["./mvnw", "spring-boot:run"]


  nginx:
    build:
      context: ./nginx
    container_name: studenttracker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro






volumes:
  postgres_data:

